<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="수학선생님">
<title>🧮 아빠표 AI 수학 선생님</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #FFE99A;
  --orange: #FFCBA4;
  --mint:   #B5EAD7;
  --blue:   #C7E9FB;
  --purple: #D4B8F0;
  --text:   #3A3060;
  --sub:    #8A7FAA;
  --radius: 20px;
  --shadow: 0 6px 24px rgba(160,140,100,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #FFF8DC 0%, #E8F4FF 50%, #E4F7EE 100%);
  color: var(--text);
  padding-bottom: 40px;
  font-size: 16px;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(circle, #FFE99A 1.5px, transparent 1.5px),
    radial-gradient(circle, #B5EAD7 1px, transparent 1px);
  background-size: 90px 90px, 60px 60px;
  background-position: 10px 10px, 40px 40px;
  opacity: 0.3;
}
.wrap { position:relative; z-index:1; max-width:680px; margin:0 auto; padding:0 14px; }

/* 헤더 */
header { text-align:center; padding:28px 16px 20px; }
.badge {
  display:inline-block;
  background:linear-gradient(135deg,#FFD166,#FF9A3C);
  color:white; font-size:11px; font-weight:800;
  letter-spacing:2px; text-transform:uppercase;
  padding:5px 16px; border-radius:30px; margin-bottom:10px;
  box-shadow:0 4px 12px rgba(255,160,60,.3);
}
h1 { font-family:'Gaegu',cursive; font-size:clamp(28px,7vw,46px); line-height:1.2; margin-bottom:6px; }
h1 span { color:#E07820; }
.subtitle { font-size:14px; color:var(--sub); font-weight:600; }

/* 카드 */
.card {
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(10px);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px;
  margin-bottom:14px;
  border:2px solid rgba(255,255,255,.8);
}
.sec-title {
  font-size:11px; font-weight:800; letter-spacing:1.5px;
  text-transform:uppercase; color:var(--sub);
  margin-bottom:12px; display:flex; align-items:center; gap:7px;
}
.sec-title::after {
  content:''; flex:1; height:2px;
  background:linear-gradient(90deg,#FFD166,transparent); border-radius:2px;
}

/* API 입력 */
.row { display:flex; gap:8px; }
input[type="password"] {
  flex:1; padding:13px 15px;
  border:2px solid #FFE5B0; border-radius:13px;
  font-family:'Nunito',sans-serif; font-size:15px; color:var(--text);
  background:rgba(255,255,255,.9); outline:none; transition:border-color .2s;
}
input[type="password"]:focus { border-color:#FFB347; }
.btn-sm {
  padding:13px 16px; border:none; border-radius:13px;
  background:linear-gradient(135deg,var(--mint),var(--blue));
  color:#2A6A5A; font-family:'Nunito',sans-serif;
  font-size:14px; font-weight:800; cursor:pointer; white-space:nowrap; transition:all .2s;
  min-height:48px;
}
.btn-sm:active { transform:scale(.97); }
.help {
  background:linear-gradient(135deg,rgba(255,241,168,.6),rgba(255,220,185,.5));
  border:2px solid rgba(255,200,100,.4); border-radius:13px;
  padding:12px 14px; font-size:13px; color:#8A6020;
  font-weight:600; line-height:1.7; margin-top:10px;
}
.help strong { display:block; margin-bottom:3px; }
.help a { color:#C07020; }

/* 레벨 */
.levels { display:flex; gap:8px; flex-wrap:wrap; }
.lv-btn {
  flex:1; min-width:72px; padding:13px 6px;
  border:2.5px solid #FFE5B0; border-radius:15px;
  background:white; font-family:'Nunito',sans-serif;
  font-size:12px; font-weight:700; color:var(--sub);
  cursor:pointer; text-align:center; transition:all .2s;
  min-height:72px;
}
.lv-btn .em { display:block; font-size:22px; margin-bottom:4px; }
.lv-btn:active { transform:scale(.96); }
.lv-btn.on {
  border-color:#E07820;
  background:linear-gradient(135deg,#FFF0CC,#FFE0B0);
  color:#C05010; transform:translateY(-2px);
  box-shadow:0 4px 14px rgba(220,120,40,.2);
}

/* 탭 */
.tabs { display:flex; gap:8px; margin-bottom:14px; }
.tab {
  flex:1; padding:13px 8px; border:2px solid #FFE5B0; border-radius:12px;
  background:white; font-family:'Nunito',sans-serif;
  font-size:14px; font-weight:700; color:var(--sub);
  cursor:pointer; transition:all .2s; min-height:48px;
}
.tab.on {
  background:linear-gradient(135deg,var(--mint),var(--blue));
  border-color:#7DD8B8; color:#2A7A5A;
}
.tab:active { transform:scale(.97); }
.panel { display:none; }
.panel.on { display:block; }

/* 드롭존 */
.dropzone {
  border:3px dashed #FFD080; border-radius:16px;
  padding:28px 16px; text-align:center; cursor:pointer;
  background:linear-gradient(135deg,rgba(255,233,154,.15),rgba(199,233,251,.15));
  transition:all .25s; position:relative;
}
.dropzone:active { transform:scale(.99); }
.dropzone input[type="file"] {
  position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%;
}
.dz-icon { font-size:44px; display:block; margin-bottom:8px; }
.dz-text { font-size:15px; font-weight:700; line-height:1.5; }
.dz-sub  { font-size:12px; color:var(--sub); margin-top:4px; }

/* 카메라 버튼 (모바일 전용) */
.camera-btn {
  width:100%; margin-top:10px; padding:15px;
  border:none; border-radius:14px;
  background:linear-gradient(135deg,#FFD166,#FF9A3C);
  color:white; font-family:'Nunito',sans-serif;
  font-size:15px; font-weight:900; cursor:pointer;
  box-shadow:0 4px 14px rgba(255,150,60,.3); transition:all .2s;
  display:flex; align-items:center; justify-content:center; gap:8px;
  min-height:52px;
}
.camera-btn:active { transform:scale(.97); }

#preview {
  width:100%; max-height:260px; object-fit:contain;
  border-radius:13px; margin-top:12px; display:none;
  box-shadow:0 4px 16px rgba(0,0,0,.1);
}

/* 텍스트 */
textarea {
  width:100%; padding:14px 15px;
  border:2px solid #FFE5B0; border-radius:15px;
  font-family:'Nunito',sans-serif; font-size:15px; color:var(--text);
  resize:vertical; min-height:110px; outline:none;
  background:rgba(255,255,255,.9); transition:border-color .2s; line-height:1.6;
}
textarea:focus { border-color:#FFB347; }

/* 메인 버튼 */
.btn-main {
  width:100%; padding:17px; border:none; border-radius:17px;
  background:linear-gradient(135deg,#FFD166,#FF8C42);
  color:white; font-family:'Nunito',sans-serif;
  font-size:17px; font-weight:900; cursor:pointer;
  box-shadow:0 6px 20px rgba(255,140,60,.35); transition:all .2s;
  min-height:56px;
}
.btn-main:active { transform:scale(.98); }
.btn-main:disabled { opacity:.6; cursor:not-allowed; }

/* 로딩 */
#loading { display:none; text-align:center; padding:26px; }
.dots { display:inline-flex; gap:8px; }
.dot {
  width:12px; height:12px;
  background:linear-gradient(135deg,#FFD166,#FF9A3C);
  border-radius:50%; animation:bounce .8s infinite ease-in-out;
}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:scale(1)}40%{transform:scale(1.5)}}
.load-txt { margin-top:12px; font-size:14px; color:var(--sub); font-weight:700; }

/* 결과 */
#result { display:none; border-left:5px solid #FFD166; }
.res-head { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.avatar {
  width:48px; height:48px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,#FFD166,#FF9A3C);
  display:flex; align-items:center; justify-content:center; font-size:24px;
  box-shadow:0 4px 12px rgba(255,160,60,.3);
}
.res-head .info strong { font-size:15px; display:block; }
.res-head .info span  { font-size:12px; color:var(--sub); }
.res-body {
  background:linear-gradient(135deg,rgba(255,255,255,.8),rgba(255,248,220,.5));
  border-radius:13px; padding:17px;
  font-size:15px; line-height:2; color:var(--text);
  border:1.5px solid rgba(255,200,80,.3); word-break:keep-all;
}

/* 퀴즈 영역 */
.quiz-wrap { margin:16px 0 4px; }
.quiz-question {
  background:linear-gradient(135deg,rgba(255,217,102,.15),rgba(255,200,130,.1));
  border:2px solid rgba(255,180,60,.3); border-radius:14px;
  padding:14px 16px; font-size:14px; font-weight:700;
  color:var(--text); line-height:1.8; margin-bottom:12px;
}
.quiz-choices { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
.choice-btn {
  width:100%; padding:13px 16px; border:2.5px solid #E8DFF5;
  border-radius:13px; background:white;
  font-family:'Nunito',sans-serif; font-size:14px; font-weight:700;
  color:var(--text); cursor:pointer; text-align:left;
  transition:all .2s; display:flex; align-items:center; gap:10px;
  min-height:48px;
}
.choice-btn:active { transform:scale(.98); }
.choice-btn:hover:not(.answered) { border-color:#FFB347; background:#FFFAF0; transform:translateX(4px); }
.choice-btn.correct {
  border-color:#4CAF50; background:linear-gradient(135deg,#E8F5E9,#C8F5CC);
  color:#1B5E20;
}
.choice-btn.wrong {
  border-color:#F44336; background:linear-gradient(135deg,#FFEBEE,#FFC8CC);
  color:#B71C1C;
}
.choice-btn.reveal-correct {
  border-color:#4CAF50; background:linear-gradient(135deg,#E8F5E9,#C8F5CC);
  color:#1B5E20;
}
.choice-badge {
  display:inline-flex; align-items:center; justify-content:center;
  width:26px; height:26px; border-radius:50%;
  background:linear-gradient(135deg,#FFD166,#FF9A3C);
  color:white; font-size:12px; font-weight:900; flex-shrink:0;
}
.choice-btn.correct .choice-badge { background:linear-gradient(135deg,#66BB6A,#43A047); }
.choice-btn.wrong .choice-badge { background:linear-gradient(135deg,#EF5350,#E53935); }
.choice-btn.reveal-correct .choice-badge { background:linear-gradient(135deg,#66BB6A,#43A047); }
.quiz-result-msg {
  display:none; padding:13px 16px; border-radius:13px;
  font-size:14px; font-weight:800; text-align:center; margin-bottom:8px;
}
.quiz-result-msg.correct-msg {
  background:linear-gradient(135deg,#E8F5E9,#C8F5CC);
  color:#1B5E20; border:2px solid #A5D6A7;
}
.quiz-result-msg.wrong-msg {
  background:linear-gradient(135deg,#FFF3E0,#FFE0B2);
  color:#E65100; border:2px solid #FFCC80;
}
.ans-box {
  display:none; margin-top:9px; padding:14px 16px;
  background:linear-gradient(135deg,#FFF1A8,#FFE4B5);
  border-radius:13px; border-left:4px solid #FFB347;
  font-weight:700; color:#8A5A00; font-size:14px; line-height:1.8;
}
.btn-reset {
  margin-top:14px; padding:12px 22px; border:none; border-radius:12px;
  background:linear-gradient(135deg,#FFE8B0,#FFD08A);
  color:#9A5010; font-family:'Nunito',sans-serif;
  font-size:14px; font-weight:800; cursor:pointer; transition:all .2s;
  min-height:46px;
}
.btn-reset:active { transform:scale(.97); }

@media(max-width:400px){
  .card{padding:16px;}
  .lv-btn{min-width:60px; font-size:11px;}
  h1{font-size:26px;}
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="badge">🌟 아빠가 직접 만든 앱</div>
    <h1>🧮 AI <span>수학 선생님</span></h1>
    <p class="subtitle">문제 사진을 찍거나 입력하면 풀어드려요! ✏️</p>
  </header>

  <!-- API 키 -->
  <div class="card" style="border-left:5px solid #FFD166">
    <div class="sec-title">🔑 선생님 연결하기</div>
    <div class="row">
      <input type="password" id="apiKey" placeholder="Groq API 키 (gsk_...)">
      <button class="btn-sm" onclick="saveKey()">✅ 저장</button>
    </div>
    <div class="help">
      <strong>📌 Groq API 키 발급 (완전 무료!)</strong>
      1. <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a> 접속<br>
      2. 구글 계정 로그인 → "Create API Key"<br>
      3. 키 복사 후 위에 붙여넣기!
    </div>
  </div>

  <!-- 레벨 -->
  <div class="card">
    <div class="sec-title">🎓 학년 선택</div>
    <div class="levels">
      <button class="lv-btn" data-lv="초등학교 3~4학년" onclick="setLevel(this)">
        <span class="em">🐣</span>초등<br>3~4학년
      </button>
      <button class="lv-btn" data-lv="초등학교 5~6학년" onclick="setLevel(this)">
        <span class="em">🐥</span>초등<br>5~6학년
      </button>
      <button class="lv-btn on" data-lv="중학교 1학년" onclick="setLevel(this)">
        <span class="em">🐦</span>중학교<br>1학년
      </button>
      <button class="lv-btn" data-lv="중학교 2학년" onclick="setLevel(this)">
        <span class="em">🦅</span>중학교<br>2학년
      </button>
      <button class="lv-btn" data-lv="중학교 3학년" onclick="setLevel(this)">
        <span class="em">🎓</span>중학교<br>3학년
      </button>
    </div>
  </div>

  <!-- 입력 -->
  <div class="card">
    <div class="sec-title">📝 문제 입력</div>
    <div class="tabs">
      <button class="tab on" id="tabPhoto" onclick="switchTab('photo')">📷 사진 업로드</button>
      <button class="tab"    id="tabText"  onclick="switchTab('text')">✏️ 직접 입력</button>
    </div>

    <div class="panel on" id="panelPhoto">
      <div class="dropzone" id="dz">
        <input type="file" id="fileInput" accept="image/*">
        <span class="dz-icon">📄</span>
        <div class="dz-text" id="dzText">여기를 눌러 사진 선택<br>또는 끌어다 놓기</div>
        <div class="dz-sub">JPG · PNG OK</div>
      </div>
      <!-- 모바일 카메라 직접 촬영 버튼 -->
      <button class="camera-btn" onclick="openCamera()">
        📸 카메라로 바로 찍기
      </button>
      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
      <img id="preview" alt="미리보기">
    </div>

    <div class="panel" id="panelText">
      <textarea id="textInput" placeholder="수학 문제를 입력하세요 ✏️&#10;예) 2x + 5 = 13 일 때, x의 값을 구하시오.&#10;&#10;여러 문제도 한번에 입력 가능해요!"></textarea>
    </div>
  </div>

  <!-- 분석 버튼 -->
  <button class="btn-main" id="analyzeBtn" onclick="analyze()">
    🔍 선생님께 풀어달라고 하기!
  </button>

  <!-- 로딩 -->
  <div id="loading" class="card" style="margin-top:14px">
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="load-txt" id="loadTxt">선생님이 문제를 풀고 있어요... 🤔</div>
  </div>

  <!-- 결과 -->
  <div class="card" id="result" style="margin-top:14px">
    <div class="res-head">
      <div class="avatar">🧮</div>
      <div class="info">
        <strong>AI 수학 선생님</strong>
        <span id="lvChip" style="font-size:12px;color:var(--sub)"></span>
      </div>
    </div>
    <div class="res-body" id="resBody"></div>
    <button class="btn-reset" onclick="resetAll()">🔄 다른 문제 풀기</button>
  </div>

</div>
<script>
var level  = '중학교 1학년';
var curTab = 'photo';
var imgFile= null;
var loadTimer;
var msgs = [
  '선생님이 문제를 풀고 있어요... 🤔',
  '풀이 과정을 정리하는 중이에요... 📝',
  '쉽게 설명할 방법을 찾고 있어요... 💡',
  '거의 다 됐어요! 조금만요... ⭐'
];

// API 키
function saveKey() {
  var k = document.getElementById('apiKey').value.trim();
  if (!k) { alert('API 키를 입력해 주세요!'); return; }
  localStorage.setItem('groq_key', k);
  document.getElementById('apiKey').style.borderColor = '#7DD8B8';
  toast('✅ API 키가 저장됐어요!');
}
window.onload = function() {
  var k = localStorage.getItem('groq_key');
  if (k) {
    document.getElementById('apiKey').value = k;
    document.getElementById('apiKey').style.borderColor = '#7DD8B8';
  }
};

// 레벨
function setLevel(btn) {
  document.querySelectorAll('.lv-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  level = btn.getAttribute('data-lv');
}

// 탭
function switchTab(tab) {
  curTab = tab;
  document.getElementById('tabPhoto').classList.toggle('on', tab==='photo');
  document.getElementById('tabText').classList.toggle('on',  tab==='text');
  document.getElementById('panelPhoto').classList.toggle('on', tab==='photo');
  document.getElementById('panelText').classList.toggle('on',  tab==='text');
}

// 파일
document.getElementById('fileInput').onchange = function() {
  if (this.files && this.files[0]) loadImg(this.files[0]);
};
document.getElementById('cameraInput').onchange = function() {
  if (this.files && this.files[0]) loadImg(this.files[0]);
};
function openCamera() {
  document.getElementById('cameraInput').click();
}
function loadImg(file) {
  imgFile = file;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.getElementById('preview');
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('dzText').innerHTML = '✅ ' + file.name;
  };
  reader.readAsDataURL(file);
}
var dz = document.getElementById('dz');
dz.ondragover  = function(e){ e.preventDefault(); dz.style.borderColor='#FFA040'; };
dz.ondragleave = function()  { dz.style.borderColor='#FFD080'; };
dz.ondrop = function(e) {
  e.preventDefault(); dz.style.borderColor='#FFD080';
  var f = e.dataTransfer.files[0];
  if (f && f.type.indexOf('image')===0) loadImg(f);
};

// base64
function toBase64(file) {
  return new Promise(function(res,rej){
    var r = new FileReader();
    r.onload  = function(){ res(r.result.split(',')[1]); };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// 분석
async function analyze() {
  var apiKey = localStorage.getItem('groq_key') || document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('먼저 Groq API 키를 저장해 주세요! 🔑'); return; }

  var textVal = document.getElementById('textInput').value.trim();
  if (curTab==='photo' && !imgFile) { alert('사진을 먼저 업로드해 주세요! 📸'); return; }
  if (curTab==='text'  && !textVal) { alert('수학 문제를 입력해 주세요! ✏️'); return; }

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display  = 'none';

  var mi = 0;
  document.getElementById('loadTxt').textContent = msgs[0];
  loadTimer = setInterval(function(){
    mi = (mi+1) % msgs.length;
    document.getElementById('loadTxt').textContent = msgs[mi];
  }, 2000);

  var prompt =
    '당신은 ' + level + ' 학생을 가르치는 친절하고 재미있는 수학 선생님입니다.\n' +
    '아래 수학 문제를 풀어서 반드시 한국어로만 설명해 주세요.\n' +
    '절대 금지: 한자, 일본어, 중국어 등 한글이 아닌 문자 사용 금지!\n\n' +
    '수식 표기 절대 규칙 (매우 중요!):\n' +
    '- $, $$, \\\\frac, \\\\times, \\\\div, \\\\begin, \\\\end, LaTeX 관련 기호 절대 사용 금지!\n' +
    '- 분수는 반드시 "210/420" 또는 "2 나누기 3" 형태로만 쓰세요\n' +
    '- 제곱은 x² 또는 "x의 2제곱"으로 쓰세요\n' +
    '- 곱셈은 × 또는 * 로 쓰세요\n' +
    '- 수식은 반드시 일반 텍스트로만 표현하세요. 예) 2x + 7 = 15\n\n' +
    '다음 순서로 설명해 주세요:\n\n' +
    '1️⃣ 문제 파악\n' +
    '이 문제가 무엇을 구하는 문제인지 ' + level + ' 눈높이에서 쉽게 설명해 주세요.\n\n' +
    '2️⃣ 풀이 과정 (단계별)\n' +
    '절대로 답만 알려주지 말고, 1단계, 2단계, 3단계... 순서로\n' +
    '"왜 이렇게 하는지" 이유를 포함해서 아이가 이해할 수 있게 설명해 주세요.\n' +
    '각 단계마다 계산 과정을 직접 보여주세요.\n\n' +
    '3️⃣ 최종 답\n' +
    '답을 명확하게 알려주세요.\n\n' +
    '4️⃣ 핵심 개념 정리\n' +
    '이 문제를 풀 때 꼭 알아야 할 개념이나 공식을 한 가지만 쉽게 설명해 주세요.\n\n' +
    '5️⃣ 확인 퀴즈 🎯\n' +
    '비슷한 유형의 4지선다 문제 1개를 만들어 주세요.\n' +
    '반드시 아래 형식을 정확히 지켜주세요 (JSON 블록 없이 그냥 이 태그만 사용):\n' +
    '▼QUIZ_START\n' +
    '문제: (문제 내용)\n' +
    '①: (보기1)\n' +
    '②: (보기2)\n' +
    '③: (보기3)\n' +
    '④: (보기4)\n' +
    '정답번호: (①②③④ 중 하나)\n' +
    '해설: (왜 정답인지 간단히)\n' +
    '▼QUIZ_END\n\n' +
    '이모지를 풍부하게 써서 밝고 재미있게 설명해 주세요! ⭐';

  try {
    var messages;
    var model;

    if (curTab==='photo' && imgFile) {
      var b64  = await toBase64(imgFile);
      var mime = imgFile.type || 'image/jpeg';
      model = 'meta-llama/llama-4-scout-17b-16e-instruct';
      messages = [{
        role: 'user',
        content: [
          { type:'text', text:prompt },
          { type:'image_url', image_url:{ url:'data:'+mime+';base64,'+b64 } }
        ]
      }];
    } else {
      model = 'llama-3.3-70b-versatile';
      messages = [{ role:'user', content: prompt+'\n\n풀어야 할 문제:\n'+textVal }];
    }

    var res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+apiKey
      },
      body:JSON.stringify({ model:model, messages:messages, max_tokens:2500, temperature:0.5 })
    });

    var data = await res.json();
    if (data.error) throw new Error(data.error.message);

    var text = (data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)
      ? data.choices[0].message.content : '응답을 받지 못했어요 😢';

    showResult(text);

  } catch(err) {
    alert('오류가 발생했어요 😢\n'+err.message);
  } finally {
    clearInterval(loadTimer);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = false;
  }
}

// LaTeX 제거 함수
function cleanLatex(text) {
  return text
    // \begin{aligned}...\end{aligned} 블록 처리
    .replace(/\$\$[\s\S]*?\$\$/g, function(m) {
      return m
        .replace(/\\\\/g, '\n')
        .replace(/\\begin\{[^}]+\}/g, '')
        .replace(/\\end\{[^}]+\}/g, '')
        .replace(/&=/g, '=')
        .replace(/&/g, '')
        .replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '($1)/($2)')
        .replace(/\\times/g, '×')
        .replace(/\\div/g, '÷')
        .replace(/\\cdot/g, '·')
        .replace(/\\[a-zA-Z]+/g, '')
        .replace(/[${}\\]/g, '')
        .trim();
    })
    // 인라인 $...$
    .replace(/\$([^$]+)\$/g, function(m, inner) {
      return inner
        .replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '($1)/($2)')
        .replace(/\\times/g, '×')
        .replace(/\\div/g, '÷')
        .replace(/\\cdot/g, '·')
        .replace(/\\[a-zA-Z]+/g, '')
        .replace(/[{}\\]/g, '');
    })
    // 나머지 잔여 LaTeX
    .replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '($1)/($2)')
    .replace(/\\times/g, '×')
    .replace(/\\div/g, '÷')
    .replace(/\\begin\{[^}]+\}/g, '')
    .replace(/\\end\{[^}]+\}/g, '')
    .replace(/\\\\/g, '\n')
    .replace(/\\[a-zA-Z]+/g, '')
    .replace(/[${}]/g, '');
}

// 결과 표시
function showResult(rawText) {
  var text = cleanLatex(rawText);

  // QUIZ 블록 파싱
  var quizHtml = '';
  var mainText = text;

  var quizMatch = text.match(/▼QUIZ_START([\s\S]*?)▼QUIZ_END/);
  if (quizMatch) {
    var qBlock = quizMatch[1];
    var qText = (qBlock.match(/문제:\s*(.+)/) || [])[1] || '';
    var c1 = (qBlock.match(/①:\s*(.+)/) || [])[1] || '';
    var c2 = (qBlock.match(/②:\s*(.+)/) || [])[1] || '';
    var c3 = (qBlock.match(/③:\s*(.+)/) || [])[1] || '';
    var c4 = (qBlock.match(/④:\s*(.+)/) || [])[1] || '';
    var ans = (qBlock.match(/정답번호:\s*([①②③④])/) || [])[1] || '';
    var exp = (qBlock.match(/해설:\s*(.+)/) || [])[1] || '';
    var ansIdx = ['①','②','③','④'].indexOf(ans);

    quizHtml = '<div class="quiz-wrap">' +
      '<div class="quiz-question">🎯 확인 퀴즈!<br>' + escHtml(qText.trim()) + '</div>' +
      '<div class="quiz-choices" id="qChoices">';
    ['①','②','③','④'].forEach(function(num, i) {
      var label = [c1,c2,c3,c4][i];
      quizHtml += '<button class="choice-btn" onclick="pickChoice(this,' + i + ',' + ansIdx + ',\'' + escAttr(exp) + '\')">' +
        '<span class="choice-badge">' + num + '</span>' + escHtml(label.trim()) +
        '</button>';
    });
    quizHtml += '</div>' +
      '<div class="quiz-result-msg" id="qResultMsg"></div>' +
      '<div class="ans-box" id="qAnsBox"></div>' +
      '</div>';

    mainText = text.replace(/▼QUIZ_START[\s\S]*?▼QUIZ_END/, '');
  } else {
    // fallback: 기존 ▼정답: 방식
    var parts = escHtml(mainText).split(/(▼정답:[^\n]*(?:\n[^\n]+)*)/);
    var fb = '';
    parts.forEach(function(p) {
      if (p.indexOf('▼정답:') === 0) {
        var at = p.replace('▼정답:', '✅ 정답:');
        fb += '<div class="quiz-wrap">' +
          '<button class="ans-btn" onclick="toggleAns(this)">🔍 정답 보기 (눌러보세요!)</button>' +
          '<div class="ans-box">' + at + '</div></div>';
      } else { fb += p; }
    });
    document.getElementById('resBody').innerHTML = fb.replace(/\n/g,'<br>');
    document.getElementById('lvChip').textContent = level;
    document.getElementById('result').style.display = 'block';
    setTimeout(function(){ document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'}); }, 100);
    return;
  }

  var esc = escHtml(mainText);
  document.getElementById('resBody').innerHTML = esc.replace(/\n/g,'<br>') + quizHtml;
  document.getElementById('lvChip').textContent = level;
  document.getElementById('result').style.display = 'block';
  setTimeout(function(){ document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'}); }, 100);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return s.replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/\n/g,' ');
}

// 퀴즈 선택
function pickChoice(btn, idx, ansIdx, exp) {
  var wrap = btn.closest('.quiz-wrap');
  var btns = wrap.querySelectorAll('.choice-btn');
  var msg  = wrap.querySelector('.quiz-result-msg');
  var box  = wrap.querySelector('.ans-box');

  // 이미 답했으면 무시
  if (btn.classList.contains('answered')) return;
  btns.forEach(function(b){ b.classList.add('answered'); });

  if (idx === ansIdx) {
    btn.classList.add('correct');
    msg.className = 'quiz-result-msg correct-msg';
    msg.innerHTML = '🎉 정답이에요! 훌륭해요!';
  } else {
    btn.classList.add('wrong');
    btns[ansIdx].classList.add('reveal-correct');
    msg.className = 'quiz-result-msg wrong-msg';
    msg.innerHTML = '😅 아쉽지만 틀렸어요! 정답이 표시됐어요.';
  }
  msg.style.display = 'block';
  box.innerHTML = '💡 해설: ' + exp;
  box.style.display = 'block';
}

// 정답 토글 (fallback)
function toggleAns(btn) {
  var box  = btn.nextElementSibling;
  var open = box.style.display === 'block';
  box.style.display = open ? 'none' : 'block';
  btn.textContent   = open ? '🔍 정답 보기 (눌러보세요!)' : '🙈 정답 숨기기';
  btn.style.background = open
    ? 'linear-gradient(135deg,#B5EAD7,#C7E9FB)'
    : 'linear-gradient(135deg,#FFB3C6,#D4B8F0)';
}

// 초기화
function resetAll() {
  document.getElementById('result').style.display  = 'none';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('dzText').innerHTML = '여기를 눌러 사진 선택<br>또는 끌어다 놓기';
  document.getElementById('fileInput').value  = '';
  document.getElementById('cameraInput').value= '';
  document.getElementById('textInput').value  = '';
  imgFile = null;
  window.scrollTo({ top:0, behavior:'smooth' });
}

// 토스트
function toast(msg) {
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);' +
    'background:linear-gradient(135deg,#FFD166,#FF9A3C);color:white;' +
    'padding:10px 22px;border-radius:30px;font-family:Nunito,sans-serif;' +
    'font-weight:800;font-size:13px;z-index:9999;box-shadow:0 6px 20px rgba(255,150,60,.4);';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2500);
}
</script>
